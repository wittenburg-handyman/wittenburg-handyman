<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Estimate Form</title>
<style>
body {font-family: Arial; padding:40px;}
.form-box {max-width:500px;margin:auto;}
button {padding:12px 20px;background:#c94b5c;color:white;border:none;}
.success {display:none;color:green;font-weight:bold;margin-top:15px;}
</style>
</head>
<body>

<div class="form-box">
<h2>Request a Free Estimate</h2>

<form id="form">
<input name="name" placeholder="Name" required><br><br>
<input name="email" type="email" placeholder="Email" required><br><br>
<textarea name="message" placeholder="Project details" required></textarea><br><br>

<button type="submit">Get My Free Estimate</button>
</form>

<div class="success" id="successMsg">✅ Thank you! We'll contact you shortly.</div>

</div>

<script>
document.getElementById("form").addEventListener("submit", function(e){
    e.preventDefault();

    fetch("https://formsubmit.co/ajax/dulyn.wittenburg@yahoo.com", {
        method: "POST",
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
            name: this.name.value,
            email: this.email.value,
            message: this.message.value
        })
    })
    .then(response => response.json())
    .then(data => {
        document.getElementById("form").style.display = "none";
        document.getElementById("successMsg").style.display = "block";
    });
});
</script>

</body>
</html>
